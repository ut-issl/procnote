name: Update Homebrew Cask

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.0.1)"
        required: true

permissions:
  contents: read

jobs:
  update-cask:
    runs-on: macos-latest
    steps:
      - name: Determine tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            printf 'tag=%s\n' "$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            printf 'tag=%s\n' "$REF_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract version from tag
        id: version
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download macOS DMGs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release download "$TAG" \
            --repo "$REPOSITORY" \
            --pattern '*_aarch64.dmg' \
            --pattern '*_x64.dmg'

      - name: Compute checksums
        id: sha
        run: |
          echo "arm64=$(shasum -a 256 *_aarch64.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x64=$(shasum -a 256 *_x64.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ut-issl/homebrew-tap
          persist-credentials: false

      - name: Update cask formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA_ARM64: ${{ steps.sha.outputs.arm64 }}
          SHA_X64: ${{ steps.sha.outputs.x64 }}
        run: |
          ruby -e '
            version = ENV["VERSION"]
            sha_arm64 = ENV["SHA_ARM64"]
            sha_x64 = ENV["SHA_X64"]

            formula = <<~RUBY
              cask "procnote" do
                version "#{version}"

                on_arm do
                  sha256 "#{sha_arm64}"

                  url "https://github.com/ut-issl/procnote/releases/download/v\#{version}/procnote_\#{version}_aarch64.dmg"
                end
                on_intel do
                  sha256 "#{sha_x64}"

                  url "https://github.com/ut-issl/procnote/releases/download/v\#{version}/procnote_\#{version}_x64.dmg"
                end

                name "procnote"
                desc "Procedure execution tool"
                homepage "https://github.com/ut-issl/procnote"

                depends_on :macos

                app "procnote.app"
                binary "\#{appdir}/procnote.app/Contents/Resources/bin/procnote"

                uninstall quit: "com.github.shunichironomura.procnote"

                zap trash: [
                  "~/Library/Logs/com.github.shunichironomura.procnote",
                  "~/Library/WebKit/com.github.shunichironomura.procnote",
                ]
              end
            RUBY

            File.write("Casks/procnote.rb", formula)
          '

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/procnote.rb
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update procnote to $VERSION"
            gh auth setup-git --hostname github.com --force
            git push
          fi
