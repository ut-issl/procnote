name: Update Homebrew Cask

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.0.1)"
        required: true

jobs:
  update-cask:
    runs-on: macos-latest
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract version from tag
        id: version
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download macOS DMGs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern '*_aarch64.dmg' \
            --pattern '*_x64.dmg'

      - name: Compute checksums
        id: sha
        run: |
          echo "arm64=$(shasum -a 256 *_aarch64.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x64=$(shasum -a 256 *_x64.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: shunichironomura/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update cask formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA_ARM64: ${{ steps.sha.outputs.arm64 }}
          SHA_X64: ${{ steps.sha.outputs.x64 }}
        run: |
          ruby -e '
            version = ENV["VERSION"]
            sha_arm64 = ENV["SHA_ARM64"]
            sha_x64 = ENV["SHA_X64"]

            formula = <<~RUBY
              cask "procnote" do
                version "#{version}"

                on_arm do
                  sha256 "#{sha_arm64}"
                  url "https://github.com/shunichironomura/procnote/releases/download/v\#{version}/procnote_\#{version}_aarch64.dmg",
                      verified: "github.com/shunichironomura/procnote/"
                end
                on_intel do
                  sha256 "#{sha_x64}"
                  url "https://github.com/shunichironomura/procnote/releases/download/v\#{version}/procnote_\#{version}_x64.dmg",
                      verified: "github.com/shunichironomura/procnote/"
                end

                name "procnote"
                desc "Procedure execution tool"
                homepage "https://github.com/shunichironomura/procnote"

                app "procnote.app"
                binary "\#{appdir}/procnote.app/Contents/MacOS/procnote"

                uninstall quit: "com.github.shunichironomura.procnote"

                zap trash: [
                  "~/Library/Logs/com.github.shunichironomura.procnote",
                  "~/Library/WebKit/com.github.shunichironomura.procnote",
                ]
              end
            RUBY

            File.write("Casks/procnote.rb", formula)
          '

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/procnote.rb
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update procnote to ${{ steps.version.outputs.version }}"
            git push
          fi
